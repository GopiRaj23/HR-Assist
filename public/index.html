<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Assist - Interview Analyzer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1025 0%, #0d1b2a 50%, #1b2838 100%);
      color: white;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid rgba(139, 92, 246, 0.3);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p { font-size: 0.85rem; color: #7c8ba1; margin-top: 0.25rem; }

    .container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    /* Upload Section */
    .upload-card {
      background: #161a2e;
      border: 1px solid #2a2f45;
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .upload-zone {
      border: 2px dashed #3b3f5c;
      border-radius: 12px;
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: #1a1f35;
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: #8b5cf6;
      background: #1e1a3a;
      box-shadow: 0 0 30px rgba(139, 92, 246, 0.1);
    }

    .upload-zone .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .upload-zone .label { font-size: 1rem; color: #94a3b8; }
    .upload-zone .hint { font-size: 0.8rem; color: #4b5563; margin-top: 0.5rem; }

    .file-info {
      display: none;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(52, 211, 153, 0.08);
      border-radius: 8px;
      border: 1px solid rgba(52, 211, 153, 0.2);
    }

    .file-info.show { display: flex; }
    .file-info .name { flex: 1; font-size: 0.9rem; font-weight: 500; color: #34d399; }
    .file-info .size { font-size: 0.8rem; color: #6b7280; }
    .file-info .remove { cursor: pointer; color: #f87171; font-size: 1.2rem; }

    .upload-btn {
      display: none;
      width: 100%;
      margin-top: 1rem;
      padding: 0.85rem;
      background: linear-gradient(135deg, #8b5cf6, #6366f1, #3b82f6);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }

    .upload-btn:hover { box-shadow: 0 6px 25px rgba(99, 102, 241, 0.5); transform: translateY(-1px); }
    .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .upload-btn.show { display: block; }

    /* Progress */
    .progress-section {
      display: none;
      margin-top: 1.5rem;
    }

    .progress-section.show { display: block; }

    .progress-bar-container {
      height: 4px;
      background: #1e2235;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #8b5cf6, #06b6d4, #8b5cf6);
      background-size: 200% 100%;
      border-radius: 2px;
      animation: shimmer 2s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .progress-text {
      font-size: 0.85rem;
      color: #7c8ba1;
      margin-top: 0.5rem;
      text-align: center;
    }

    /* Reports List */
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #c4b5fd;
    }

    .report-card {
      background: #161a2e;
      border: 1px solid #2a2f45;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .report-card:hover {
      border-color: #8b5cf6;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.15);
      transform: translateY(-1px);
    }

    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .report-filename { font-weight: 600; font-size: 0.95rem; color: #e2e8f0; }

    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .status-processing { background: rgba(251, 191, 36, 0.15); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3); }
    .status-completed { background: rgba(52, 211, 153, 0.12); color: #34d399; border: 1px solid rgba(52, 211, 153, 0.3); }
    .status-failed { background: rgba(248, 113, 113, 0.12); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.3); }

    .report-meta {
      display: flex;
      gap: 1.5rem;
      font-size: 0.85rem;
      color: #6b7280;
    }

    /* Report Detail */
    .report-detail { display: none; }
    .report-detail.show { display: block; }

    .back-btn {
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid #3b3f5c;
      color: #a78bfa;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      transition: all 0.2s;
    }

    .back-btn:hover { background: rgba(139, 92, 246, 0.2); border-color: #8b5cf6; }

    .score-hero {
      text-align: center;
      padding: 2.5rem 2rem;
      background: linear-gradient(135deg, #161a2e 0%, #1a1035 100%);
      border: 1px solid #2a2f45;
      border-radius: 16px;
      margin-bottom: 1.5rem;
    }

    .score-number {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
    }

    .score-label { font-size: 0.9rem; color: #6b7280; margin-top: 0.5rem; }
    .score-rec { margin-top: 1rem; font-size: 1rem; font-weight: 500; color: #c4b5fd; }

    .score-high { color: #34d399; text-shadow: 0 0 30px rgba(52, 211, 153, 0.3); }
    .score-mid { color: #fbbf24; text-shadow: 0 0 30px rgba(251, 191, 36, 0.3); }
    .score-low { color: #f87171; text-shadow: 0 0 30px rgba(248, 113, 113, 0.3); }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 600px) { .detail-grid { grid-template-columns: 1fr; } }

    .detail-card {
      background: #161a2e;
      border: 1px solid #2a2f45;
      border-radius: 12px;
      padding: 1.25rem;
    }

    .detail-card h3 {
      font-size: 0.8rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }

    .detail-card li {
      font-size: 0.9rem;
      margin-bottom: 0.4rem;
      padding-left: 0.25rem;
      color: #cbd5e1;
    }

    .strength-list li::marker { color: #34d399; }
    .weakness-list li::marker { color: #f87171; }

    /* Summary card in report detail */
    .summary-card {
      background: #161a2e;
      border: 1px solid #2a2f45;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .summary-card h3 {
      font-size: 0.8rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .summary-card p { font-size: 0.9rem; line-height: 1.6; color: #94a3b8; }

    /* Q&A Analysis */
    .qa-card {
      background: #161a2e;
      border: 1px solid #2a2f45;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s;
    }

    .qa-card:hover { border-color: #3b3f5c; }

    .qa-question {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
      color: #a78bfa;
    }

    .qa-summary { font-size: 0.9rem; color: #94a3b8; margin-bottom: 0.75rem; line-height: 1.5; }

    .qa-scores {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .qa-score {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: #6b7280;
    }

    .qa-score-bar {
      width: 60px;
      height: 5px;
      background: #1e2235;
      border-radius: 3px;
      overflow: hidden;
    }

    .qa-score-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s;
    }

    .fill-high { background: linear-gradient(90deg, #34d399, #6ee7b7); }
    .fill-mid { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .fill-low { background: linear-gradient(90deg, #ef4444, #f87171); }

    .qa-strengths { margin-top: 0.5rem; font-size: 0.8rem; color: #34d399; }
    .qa-weaknesses { margin-top: 0.25rem; font-size: 0.8rem; color: #f87171; }

    .download-pdf-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.6rem 1.5rem;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .download-pdf-btn:hover {
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
      transform: translateY(-1px);
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #4b5563;
    }

    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.5rem; opacity: 0.5; }

    /* Score value color in QA */
    .score-val-high { color: #34d399; }
    .score-val-mid { color: #fbbf24; }
    .score-val-low { color: #f87171; }
  </style>
</head>
<body>
  <header>
    <h1>HR Assist</h1>
    <p>AI-Powered Interview Analyzer</p>
  </header>

  <div class="container">
    <!-- Upload Section -->
    <div class="upload-card">
      <div class="upload-zone" id="dropZone">
        <div class="icon">&#127908;</div>
        <div class="label">Drop interview audio here or click to browse</div>
        <div class="hint">Supports MP3, WAV, M4A, OGG, FLAC, WebM (max 100MB)</div>
      </div>
      <input type="file" id="fileInput" accept=".mp3,.wav,.m4a,.ogg,.flac,.webm,.mp4" hidden>
      <div class="file-info" id="fileInfo">
        <span class="name" id="fileName"></span>
        <span class="size" id="fileSize"></span>
        <span class="remove" id="fileRemove">&times;</span>
      </div>
      <button class="upload-btn" id="uploadBtn">Analyze Interview</button>
      <div class="progress-section" id="progressSection">
        <div class="progress-bar-container">
          <div class="progress-bar" id="progressBar" style="width: 100%"></div>
        </div>
        <div class="progress-text" id="progressText">Uploading and processing...</div>
      </div>
    </div>

    <!-- Reports List -->
    <div id="reportsList">
      <div class="section-title">&#128203; Reports</div>
      <div id="reportsContainer">
        <div class="empty-state">
          <div class="icon">&#128196;</div>
          <div>No reports yet. Upload an interview recording to get started.</div>
        </div>
      </div>
    </div>

    <!-- Report Detail -->
    <div class="report-detail" id="reportDetail">
      <button class="back-btn" id="backBtn">&larr; Back to Reports</button>
      <div id="reportContent"></div>
    </div>
  </div>

  <script>
    const API = '/api/v1';
    let selectedFile = null;

    // Elements
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const fileRemove = document.getElementById('fileRemove');
    const uploadBtn = document.getElementById('uploadBtn');
    const progressSection = document.getElementById('progressSection');
    const progressText = document.getElementById('progressText');
    const reportsList = document.getElementById('reportsList');
    const reportDetail = document.getElementById('reportDetail');
    const reportContent = document.getElementById('reportContent');
    const reportsContainer = document.getElementById('reportsContainer');
    const backBtn = document.getElementById('backBtn');

    // File Selection
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files.length) selectFile(fileInput.files[0]); });
    fileRemove.addEventListener('click', clearFile);

    function selectFile(file) {
      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatSize(file.size);
      fileInfo.classList.add('show');
      uploadBtn.classList.add('show');
    }

    function clearFile() {
      selectedFile = null;
      fileInput.value = '';
      fileInfo.classList.remove('show');
      uploadBtn.classList.remove('show');
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    // Upload
    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      uploadBtn.disabled = true;
      progressSection.classList.add('show');
      progressText.textContent = 'Uploading audio file...';

      const formData = new FormData();
      formData.append('audio', selectedFile);

      try {
        const res = await fetch(`${API}/upload-audio`, { method: 'POST', body: formData });
        const json = await res.json();

        if (json.error) {
          progressText.textContent = 'Error: ' + json.error.message;
          uploadBtn.disabled = false;
          return;
        }

        const id = json.data.id;
        progressText.textContent = 'Transcribing and analyzing... This may take 1-2 minutes.';
        clearFile();

        pollReport(id);
      } catch (err) {
        progressText.textContent = 'Upload failed: ' + err.message;
        uploadBtn.disabled = false;
      }
    });

    async function pollReport(id) {
      const poll = setInterval(async () => {
        try {
          const res = await fetch(`${API}/reports/${id}`);
          const json = await res.json();
          const report = json.data;

          if (report.status === 'completed') {
            clearInterval(poll);
            progressSection.classList.remove('show');
            uploadBtn.disabled = false;
            loadReports();
            showReport(report);
          } else if (report.status === 'failed') {
            clearInterval(poll);
            progressText.textContent = 'Analysis failed: ' + (report.error || 'Unknown error');
            uploadBtn.disabled = false;
            loadReports();
          }
        } catch (err) {
          // Keep polling
        }
      }, 3000);
    }

    // Reports List
    async function loadReports() {
      try {
        const res = await fetch(`${API}/reports`);
        const json = await res.json();
        const reports = json.data || [];

        if (reports.length === 0) {
          reportsContainer.innerHTML = `
            <div class="empty-state">
              <div class="icon">&#128196;</div>
              <div>No reports yet. Upload an interview recording to get started.</div>
            </div>`;
          return;
        }

        reportsContainer.innerHTML = reports
          .sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt))
          .map(r => `
            <div class="report-card" onclick="openReport('${r.id}')">
              <div class="report-header">
                <span class="report-filename">${esc(r.fileName)}</span>
                <span class="status-badge status-${r.status}">${r.status}</span>
              </div>
              <div class="report-meta">
                <span>${new Date(r.uploadedAt).toLocaleString()}</span>
                ${r.overallScore != null ? `<span>Score: ${r.overallScore}/10</span>` : ''}
                ${r.recommendation ? `<span>${esc(r.recommendation.split('\u2014')[0].trim())}</span>` : ''}
              </div>
            </div>
          `).join('');
      } catch (err) {
        console.error('Failed to load reports:', err);
      }
    }

    async function openReport(id) {
      try {
        const res = await fetch(`${API}/reports/${id}`);
        const json = await res.json();
        showReport(json.data);
      } catch (err) {
        console.error('Failed to load report:', err);
      }
    }

    function showReport(r) {
      reportsList.style.display = 'none';
      reportDetail.classList.add('show');

      const scoreClass = r.overallScore >= 7 ? 'score-high' : r.overallScore >= 5 ? 'score-mid' : 'score-low';
      const duration = r.duration ? Math.round(r.duration / 60) + ' min' : 'N/A';

      reportContent.innerHTML = `
        <div class="score-hero">
          <div class="score-number ${scoreClass}">${r.overallScore != null ? r.overallScore : '\u2014'}</div>
          <div class="score-label">Overall Score out of 10</div>
          <div class="score-rec">${esc(r.recommendation || r.summary || '')}</div>
          <div style="margin-top:0.75rem; font-size:0.85rem; color:#4b5563">
            ${esc(r.fileName)} &middot; ${duration} &middot; ${r.questionAnalyses.length} questions analyzed
          </div>
          <a class="download-pdf-btn" href="${API}/reports/${r.id}/pdf" download>&#128196; Download PDF</a>
        </div>

        ${r.summary ? `<div class="summary-card">
          <h3>Summary</h3>
          <p>${esc(r.summary)}</p>
        </div>` : ''}

        <div class="detail-grid">
          <div class="detail-card">
            <h3>Strengths</h3>
            <ul class="strength-list">
              ${r.strengths.length ? r.strengths.map(s => `<li>${esc(s)}</li>`).join('') : '<li style="color:#4b5563">None identified</li>'}
            </ul>
          </div>
          <div class="detail-card">
            <h3>Weaknesses</h3>
            <ul class="weakness-list">
              ${r.weaknesses.length ? r.weaknesses.map(w => `<li>${esc(w)}</li>`).join('') : '<li style="color:#4b5563">None identified</li>'}
            </ul>
          </div>
        </div>

        <div class="section-title">Question-by-Question Analysis</div>
        ${r.questionAnalyses.map(qa => `
          <div class="qa-card">
            <div class="qa-question">Q${qa.questionNumber}: ${esc(qa.question)}</div>
            <div class="qa-summary">${esc(qa.answerSummary)}</div>
            <div class="qa-scores">
              ${scoreBar('Relevance', qa.relevanceScore)}
              ${scoreBar('Clarity', qa.clarityScore)}
              ${scoreBar('Confidence', qa.confidenceScore)}
            </div>
            ${qa.strengths.length ? `<div class="qa-strengths">+ ${qa.strengths.map(esc).join(' | ')}</div>` : ''}
            ${qa.weaknesses.length ? `<div class="qa-weaknesses">- ${qa.weaknesses.map(esc).join(' | ')}</div>` : ''}
          </div>
        `).join('')}
      `;
    }

    function scoreBar(label, score) {
      const fillClass = score >= 7 ? 'fill-high' : score >= 5 ? 'fill-mid' : 'fill-low';
      const valClass = score >= 7 ? 'score-val-high' : score >= 5 ? 'score-val-mid' : 'score-val-low';
      return `
        <div class="qa-score">
          <span>${label}</span>
          <div class="qa-score-bar">
            <div class="qa-score-fill ${fillClass}" style="width:${score * 10}%"></div>
          </div>
          <span class="${valClass}">${score}/10</span>
        </div>`;
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    backBtn.addEventListener('click', () => {
      reportDetail.classList.remove('show');
      reportsList.style.display = 'block';
      loadReports();
    });

    // Initial load
    loadReports();
  </script>
</body>
</html>
